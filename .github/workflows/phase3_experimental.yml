name: Phase 3 Experimental Sandbox Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xauusd-phase3-experimental:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify committed review artifacts
        run: |
          python xau-usd/xauusd-phase3-experimental/scripts/verify_phase3_experimental_artifacts.py --require-git-tracked --require-clean-manifest
          python xau-usd/xauusd-phase1/scripts/verify_status_dashboard_freshness.py

      - name: Install shared Phase 0 test runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "xau-usd/xauusd-phase0[dev]"

      - name: Run Phase 3 experimental tests
        run: python -m pytest xau-usd/xauusd-phase3-experimental/tests

      - name: Audit Phase 3 experimental safety boundary
        run: |
          CI_SYNTH="xau-usd/xauusd-phase3-experimental/outputs/ci_synthetic/safety_boundary"
          mkdir -p "$CI_SYNTH"
          printf "source=synthetic_fixture\nnot_real_review_evidence=true\n" > "$CI_SYNTH/CI_SYNTHETIC_ARTIFACTS.txt"
          python xau-usd/xauusd-phase3-experimental/scripts/audit_phase3_experimental_safety.py --output-dir "$CI_SYNTH"

      - name: Check committed dashboard freshness
        run: python xau-usd/xauusd-phase1/scripts/verify_status_dashboard_freshness.py

      - name: Generate isolated synthetic Phase 3 experimental reports
        run: |
          CI_SYNTH="xau-usd/xauusd-phase3-experimental/outputs/ci_synthetic/reports"
          FIXTURE="xau-usd/xauusd-phase3-experimental/tests/fixtures/sample_would_signals.csv"
          mkdir -p "$CI_SYNTH"
          printf "source=synthetic_fixture\nnot_real_review_evidence=true\n" > "$CI_SYNTH/CI_SYNTHETIC_ARTIFACTS.txt"
          python xau-usd/xauusd-phase3-experimental/scripts/simulate_phase3_from_would_signals.py --input-csv "$FIXTURE" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/audit_phase3_experimental_safety.py --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/analyze_phase3_suspend_family.py --ledger-path "$CI_SYNTH/PHASE3_EXPERIMENTAL_LEDGER.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_suspend_family_decision.py --rows-path "$CI_SYNTH/PHASE3_SUSPEND_FAMILY_ROWS.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_cost_mode_comparison.py --input-csv "$FIXTURE" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_cost_gate_review.py --ledger-path "$CI_SYNTH/PHASE3_EXPERIMENTAL_LEDGER.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_family_dedup_audit.py --input-csv "$FIXTURE" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_paper_shadow_experiment.py --ledger-path "$CI_SYNTH/PHASE3_EXPERIMENTAL_LEDGER.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_shadow_lifecycle_experiment.py --shadow-ledger-path "$CI_SYNTH/PHASE3_PAPER_SHADOW_LEDGER.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_lifecycle_guard_experiment.py --lifecycle-ledger-path "$CI_SYNTH/PHASE3_SHADOW_LIFECYCLE_LEDGER.csv" --output-dir "$CI_SYNTH"
          python xau-usd/xauusd-phase3-experimental/scripts/generate_phase3_demo_rehearsal_package.py --guard-ledger-path "$CI_SYNTH/PHASE3_LIFECYCLE_GUARD_LEDGER.csv" --guard-summary-path "$CI_SYNTH/PHASE3_LIFECYCLE_GUARD_SUMMARY.json" --output-dir "$CI_SYNTH"

      - name: Re-verify committed review artifacts
        run: |
          python xau-usd/xauusd-phase3-experimental/scripts/verify_phase3_experimental_artifacts.py --require-git-tracked --require-clean-manifest
          python xau-usd/xauusd-phase1/scripts/verify_status_dashboard_freshness.py

      - name: Verify Phase 3 remains non-deployable
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("xau-usd/xauusd-phase3-experimental/outputs/reports/PHASE3_EXPERIMENTAL_STATUS.json").read_text())
          if status.get("authorized_for_deployment") is not False:
              raise SystemExit("Phase 3 status must keep authorized_for_deployment=false")
          if status.get("broker_action_code_allowed") is not False:
              raise SystemExit("Phase 3 status must keep broker_action_code_allowed=false")
          if status.get("real_phase2_readiness") == "PASS":
              raise SystemExit("Phase 3 must not promote real Phase 2 readiness")
          PY

      - name: Upload Phase 3 experimental reports
        uses: actions/upload-artifact@v4
        with:
          name: phase3-experimental-review-reports
          path: |
            xau-usd/xauusd-phase3-experimental/outputs/reports/**
            xau-usd/xauusd-phase3-experimental/outputs/review_bundles/**
            xau-usd/xauusd-phase3-experimental/outputs/ci_synthetic/**
            status.html

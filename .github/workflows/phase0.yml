name: Phase 0 Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xauusd-phase0:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xau-usd/xauusd-phase0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Audit passive-only safety boundary
        run: python -m phase0 audit-safety

      - name: Verify processed-data availability guard
        run: |
          if python -m phase0 check-data-availability; then
            echo "Availability guard should fail before real broker data is added."
            exit 1
          fi

      - name: Run synthetic Phase 0 workflow
        run: |
          python -m phase0 validate-reference
          python -m phase0 validate-hypotheses-complete
          python -m phase0 hash-hypotheses --register --force
          python -m phase0 run-all --synthetic-sample
          python -m phase0 generate-intrabar-ambiguity-report --expert all
          python -m phase0 generate-result-manifest
          python -m phase0 generate-review-bundle
          python -m phase0 generate-snapshot

      - name: Upload synthetic review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase0-synthetic-review-artifacts
          path: |
            xau-usd/xauusd-phase0/outputs/reports/**
            xau-usd/xauusd-phase0/outputs/manifests/**
            xau-usd/xauusd-phase0/outputs/review_bundles/**
            xau-usd/xauusd-phase0/outputs/snapshots/**

name: Phase 1 Dry-Run Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xauusd-phase1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xau-usd/xauusd-phase1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Phase 0 package for shared test runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "../xauusd-phase0[dev]"

      - name: Run Phase 1 tests
        run: python -m pytest tests

      - name: Audit Phase 1 dry-run safety boundary
        run: python scripts/audit_phase1_safety.py

      - name: Verify Phase 2 transition artifacts and dashboard freshness
        run: |
          python scripts/generate_phase2_demo_preflight_report.py --root .
          python scripts/generate_phase2_owner_action_packet.py --root .
          python scripts/verify_status_dashboard_freshness.py --repo-root ../.. --status-path ../../status.html

      - name: Upload Phase 1 committed reports
        uses: actions/upload-artifact@v4
        with:
          name: phase1-committed-review-reports
          path: |
            xau-usd/xauusd-phase1/outputs/reports/**
            xau-usd/xauusd-phase1/docs/**
